<!doctype html>
<html>
  <head>
    <link rel="icon" href="favicon.png" />
	<link rel="preload" href="images/profile.png" />
    <title><%= htmlWebpackPlugin.options.title %></title>

    <script src="githubdev-fix.js"></script>
  </head>
  <body>
	<style>
		.noScriptBackground {
			position: fixed;
			top: 0;
			left: 0;
			background: #696969;
			color: #ededed;
			width: 100svw;
			height: 100svh;
		}
		.noScriptContent {
			font-weight: bold;
			font-size: 17px;
			font-family: arial;
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			text-align: center;
			padding: 5px 5px;
			background: rgba(0,0,0,0.5);
			border-radius: 2px;
		}

		.profileXMLDiv {
			width: 2px;
			height: 2px;
			overflow: hidden;
			display: block;
		}
	</style>

	<!--An XML so that things can understand the information-->
	<div class="profileXMLDiv">
		<xml id="profileXML">
			<headertext>Welcome to my profile!</headertext>
			<profileicon src="images/profile.png"></profileicon>
			
			<aboutpage n="INDEX" name="Short version">
				I build websites for friends and for fun using JavaScript or webpack, I can also build servers using Node.JS.<br>
				I usually perfer webpack for larger sites or more interactive that require code, I don't use react, instead I use my own element rendering engine
			</aboutpage>
		</xml>
	</div>
	  
    <!--No script error in case JavaScript is disabled-->
	
    <noscript>
		<div class="noScriptBackground">
			<div class="noScriptContent">
				Please enable JavaScript to use <%= htmlWebpackPlugin.options.title %>.<br>
				Once enabled, click your browsers refresh button.
			</div>
		</div>
    </noscript>

	<!--Javascript is added by webpack-->
  </body>
</html>
